name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Scala Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cfar_test
          POSTGRES_USER: cfar
          POSTGRES_PASSWORD: cfar_local
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache SBT dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('backend/build.sbt', 'backend/project/*.sbt', 'backend/project/*.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Run Scala unit tests
        working-directory: backend
        run: sbt test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cfar_test
          DB_USER: cfar
          DB_PASSWORD: cfar_local
          APP_PORT: 8080
          ENV: test
          REFUND_SIMULATION_DELAY_S: 0

  frontend-test:
    name: Frontend Vitest Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run Vitest tests
        working-directory: frontend
        run: npm run test

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build Astro site
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080
          VITE_DEFAULT_PARTNER_ID: aerodemo_airlines
          VITE_PRICING_QUOTE_TTL_S: 300
